<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il mio sito</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #222;
    }
    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 20px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Ciao, sono [Il tuo nome]</h1>
      <p>
        Benvenuto nella mia pagina personale.
        Qui puoi trovare chi sono, cosa faccio e i miei progetti.
      </p>
      <a class="btn" href="mailto:tuaemail@example.com">Contattami</a>
    </div>
  </div>
</body>
</html>
